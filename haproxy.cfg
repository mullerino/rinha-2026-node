global
  log stdout format raw local0
  maxconn 4096

defaults
  mode http
  log global
  option httplog
  option dontlognull
  timeout connect 2s
  timeout client 5s
  timeout server 5s

frontend fraud_score_front
  bind *:9999
  default_backend fraud_score_apis

backend fraud_score_apis
  balance roundrobin
  option httpchk GET /ready
  http-check expect status 200
  server api1 api1:9999 check
  server api2 api2:9999 check
